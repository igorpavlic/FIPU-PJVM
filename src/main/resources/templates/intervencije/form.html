<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hr">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${intervencija.id != null ? 'Uredi intervenciju' : 'Nova intervencija'}">Forma</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <a th:href="@{/}" class="brand">Server Evidencija</a>
    <a th:href="@{/}">Početna</a>
    <a th:href="@{/servers}">Serveri</a>
</nav>

<main>
    <h1 th:text="${intervencija.id != null ? 'Uredi intervenciju' : 'Nova intervencija'}">Forma</h1>
    <p style="color: #777; margin-bottom: 20px;">
        Server: <strong th:text="${server.naziv}"></strong>
    </p>

    <div class="forma-kartica">
        <form th:action="${intervencija.id != null ?
                          '/servers/' + server.id + '/intervencije/' + intervencija.id + '/edit' :
                          '/servers/' + server.id + '/intervencije'}"
              th:object="${intervencija}"
              method="post">

            <div class="forma-grupa">
                <label for="datum">Datum *</label>
                <input type="date" id="datum" th:field="*{datum}"
                       th:value="${intervencija.datum != null ? intervencija.datum : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"/>
                <div class="greska" th:if="${#fields.hasErrors('datum')}" th:errors="*{datum}"></div>
            </div>

            <div class="forma-grupa">
                <label for="tip">Tip intervencije</label>
                <select id="tip" th:field="*{tip}">
                    <option value="">-- odaberi --</option>
                    <option value="PREVENTIVNO">PREVENTIVNO</option>
                    <option value="KOREKTIVNO">KOREKTIVNO</option>
                    <option value="HITNO">HITNO</option>
                </select>
            </div>

            <div class="forma-grupa">
                <label for="tehnicar">Tehničar</label>
                <input type="text" id="tehnicar" th:field="*{tehnicar}" placeholder="Ime tehničara"/>
            </div>

            <div class="forma-grupa">
                <label for="trajanjeSati">Trajanje (sati)</label>
                <input type="number" id="trajanjeSati" th:field="*{trajanjeSati}" min="0" placeholder="npr. 2"/>
            </div>

            <div class="forma-grupa">
                <label for="opis">Opis *</label>
                <textarea id="opis" th:field="*{opis}" rows="4"
                          placeholder="Opis što je napravljeno..."></textarea>
                <div class="greska" th:if="${#fields.hasErrors('opis')}" th:errors="*{opis}"></div>
            </div>

            <div class="forma-akcije">
                <button type="submit" class="btn btn-primary"
                        th:text="${intervencija.id != null ? 'Spremi promjene' : 'Dodaj intervenciju'}">
                    Spremi
                </button>
                <a th:href="@{/servers/{id}(id=${server.id})}" class="btn btn-secondary">Odustani</a>
            </div>

        </form>
    </div>
</main>

<footer>
    Server Evidencija &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span>
</footer>

</body>
</html>
