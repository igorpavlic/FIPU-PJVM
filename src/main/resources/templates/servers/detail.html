<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hr">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${server.naziv}">Detalji servera</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <a th:href="@{/}" class="brand">Server Evidencija</a>
    <a th:href="@{/}">Početna</a>
    <a th:href="@{/servers}">Serveri</a>
</nav>

<main>
    <div th:if="${poruka}" class="poruka" th:text="${poruka}"></div>

    <div class="page-header">
        <h1 th:text="${server.naziv}">Naziv servera</h1>
        <div>
            <a th:href="@{/servers}" class="btn btn-secondary">← Natrag</a>
            <a th:href="@{/servers/{id}/edit(id=${server.id})}" class="btn btn-primary">Uredi</a>
            <a th:href="@{/servers/{id}/intervencije/new(id=${server.id})}" class="btn btn-success">+ Intervencija</a>
        </div>
    </div>

    <!-- podaci o serveru -->
    <div style="background: white; padding: 20px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 30px;">
        <h2 style="margin-top: 0;">Podaci o serveru</h2>

        <div class="detalj-red">
            <span class="naziv-polja">IP adresa:</span>
            <span th:text="${server.ipAdresa}"></span>
        </div>
        <div class="detalj-red">
            <span class="naziv-polja">Operativni sustav:</span>
            <span th:text="${server.operativniSustav != null ? server.operativniSustav : '-'}"></span>
        </div>
        <div class="detalj-red">
            <span class="naziv-polja">Lokacija:</span>
            <span th:text="${server.lokacija != null ? server.lokacija : '-'}"></span>
        </div>
        <div class="detalj-red">
            <span class="naziv-polja">Status:</span>
            <span th:if="${server.status != null}"
                  th:text="${server.status}"
                  th:classappend="'status status-' + ${server.status.toLowerCase()}">
            </span>
            <span th:if="${server.status == null}">-</span>
        </div>
        <div class="detalj-red" th:if="${server.napomena != null and !#strings.isEmpty(server.napomena)}">
            <span class="naziv-polja">Napomena:</span>
            <span th:text="${server.napomena}"></span>
        </div>
    </div>

    <!-- intervencije -->
    <div class="page-header">
        <h2 style="margin: 0;">Intervencije (<span th:text="${intervencije.size()}"></span>)</h2>
        <a th:href="@{/servers/{id}/intervencije/new(id=${server.id})}" class="btn btn-success">+ Nova intervencija</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Datum</th>
                <th>Tip</th>
                <th>Opis</th>
                <th>Tehničar</th>
                <th>Trajanje</th>
                <th>Akcije</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="i : ${intervencije}">
                <td th:text="${#temporals.format(i.datum, 'dd.MM.yyyy')}"></td>
                <td>
                    <span th:if="${i.tip != null}"
                          th:text="${i.tip}"
                          th:classappend="'status tip-' + ${i.tip.toLowerCase()}">
                    </span>
                    <span th:if="${i.tip == null}">-</span>
                </td>
                <td th:text="${i.opis}"></td>
                <td th:text="${i.tehnicar != null ? i.tehnicar : '-'}"></td>
                <td th:text="${i.trajanjeSati != null ? i.trajanjeSati + ' h' : '-'}"></td>
                <td>
                    <a th:href="@{/servers/{sid}/intervencije/{id}/edit(sid=${server.id}, id=${i.id})}"
                       class="btn btn-primary">Uredi</a>
                    <form th:action="@{/servers/{sid}/intervencije/{id}/delete(sid=${server.id}, id=${i.id})}"
                          method="post" style="display: inline;">
                        <button type="submit" class="btn btn-danger"
                                onclick="return confirm('Obrisati intervenciju?')">Briši</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(intervencije)}">
                <td colspan="6" style="text-align: center; padding: 20px; color: #777;">
                    Nema intervencija za ovaj server.
                </td>
            </tr>
        </tbody>
    </table>
</main>

<footer>
    Server Evidencija &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span>
</footer>

</body>
</html>
