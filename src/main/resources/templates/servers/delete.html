<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hr">
<head>
    <meta charset="UTF-8"/>
    <title>Briši server</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <a th:href="@{/}" class="brand">Server Evidencija</a>
    <a th:href="@{/}">Početna</a>
    <a th:href="@{/servers}">Serveri</a>
</nav>

<main>
    <h1>Brisanje servera</h1>

    <div class="brisanje-kartica">
        <h2>Jesi li siguran?</h2>

        <p>Brišeš server: <strong th:text="${server.naziv}"></strong></p>
        <p>IP adresa: <strong th:text="${server.ipAdresa}"></strong></p>

        <div class="upozorenje" th:if="${brIntervencija > 0}">
            Upozorenje: ovaj server ima <strong th:text="${brIntervencija}"></strong>
            intervencija koje će također biti obrisane!
        </div>

        <div class="forma-akcije" style="margin-top: 20px;">
            <form th:action="@{/servers/{id}/delete(id=${server.id})}" method="post">
                <button type="submit" class="btn btn-danger">Da, obriši</button>
            </form>
            <a th:href="@{/servers/{id}(id=${server.id})}" class="btn btn-secondary">Odustani</a>
        </div>
    </div>
</main>

<footer>
    Server Evidencija &copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span>
</footer>

</body>
</html>
